# Species Registry for ag-cli / Harvest
#
# This file is the single source of truth for species resolution.
# All tools that perform species-specific API calls (STRING, UniProt, Ensembl,
# MyGene, etc.) resolve species names via ct.tools._species which reads this file.
#
# Schema per entry:
#   binomial:       str  — canonical binomial name (exact casing used in Ensembl URLs)
#   taxon_id:       int  — primary NCBI taxon ID
#   common_names:   list — lowercase common names (used as lookup keys)
#   abbreviations:  list — short codes (used as lookup keys; case-insensitive)
#   genome_build:   str  — primary reference assembly identifier (e.g. TAIR10, IRGSP-1.0);
#                          "" if unknown. One entry per species — does not enumerate all
#                          available builds, pan-genomes, or custom assemblies.
#                          Future: pangenome support (e.g. multiple genome_builds) is
#                          a planned extension.
#   notes:          str  — optional free-text notes

species:

  # ---- Core model plants ----

  - binomial: "Arabidopsis thaliana"
    taxon_id: 3702
    common_names:
      - arabidopsis
      - thale cress
    abbreviations:
      - at
    genome_build: "TAIR10"

  - binomial: "Oryza sativa"
    taxon_id: 4530
    common_names:
      - rice
      - oryza sativa japonica
      - oryza sativa indica
    abbreviations:
      - os
    genome_build: "IRGSP-1.0"
    notes: >
      Taxon 4530 is the species-level entry. Subspecies japonica (39947)
      and indica (39946) are included as common_names aliases that resolve
      to this entry for convenience.

  - binomial: "Zea mays"
    taxon_id: 4577
